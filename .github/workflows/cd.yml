name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install EF tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Run migrations
        run: dotnet ef database update --project src/Ingestor.Infrastructure --startup-project src/Ingestor.Api
        env:
          CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set API secrets
        run: |
          flyctl secrets set \
            ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION_STRING }}" \
            --app ingestor-api --stage

      - name: Deploy API
        run: flyctl deploy --config fly.api.toml --remote-only

      - name: Set Worker secrets
        run: |
          flyctl secrets set \
            ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION_STRING }}" \
            --app ingestor-worker --stage

      - name: Deploy Worker
        run: flyctl deploy --config fly.worker.toml --remote-only

      - name: Set Web secrets
        run: |
          flyctl secrets set \
            ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION_STRING }}" \
            IngestorApi__BaseUrl="https://ingestor-api.fly.dev" \
            --app ingestor-web --stage

      - name: Deploy Web
        run: flyctl deploy --config fly.web.toml --remote-only
