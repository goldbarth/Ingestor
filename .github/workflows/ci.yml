name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.102'

      - name: Restore
        run: dotnet restore Ingestor.slnx --locked-mode

      - name: Build
        run: dotnet build Ingestor.slnx --no-restore -c Release

  unit-tests:
    name: Unit & Architecture Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.102'

      - name: Restore
        run: dotnet restore Ingestor.slnx --locked-mode

      - name: Run unit tests
        run: dotnet test tests/Ingestor.Tests.Unit --no-restore -c Release --logger "trx" --results-directory ./test-results

      - name: Run architecture tests
        run: dotnet test tests/Ingestor.Tests.Architecture --no-restore -c Release --logger "trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-arch-test-results
          path: ./test-results/*.trx

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.102'

      - name: Restore
        run: dotnet restore Ingestor.slnx --locked-mode

      - name: Run integration tests
        run: dotnet test tests/Ingestor.Tests.Integration --no-restore -c Release --logger "trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./test-results/*.trx

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t ingestor-api:ci -f src/Ingestor.Api/Dockerfile .

      - name: Build Worker image
        run: docker build -t ingestor-worker:ci -f src/Ingestor.Worker/Dockerfile .
