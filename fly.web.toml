app = 'ingestor-web'
primary_region = 'fra'

[build]
  dockerfile = 'src/Ingestor.Web/Dockerfile'
  target = 'runtime'

[env]
  DataProtection__KeysPath = "/data/keys"

[mounts]
  source = "ingestor_web_keys"
  destination = "/data/keys"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '20s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
