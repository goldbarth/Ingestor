app = 'ingestor-worker'
primary_region = 'fra'

[build]
  dockerfile = 'src/Ingestor.Worker/Dockerfile'
  target = 'runtime'

[env]
  ASPNETCORE_HTTP_PORTS = '8081'

[http_service]
  internal_port = 8081
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
